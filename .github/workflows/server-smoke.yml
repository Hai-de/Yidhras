name: Server Smoke Tests

on: 
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/dev.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare runtime prerequisites
        run: pnpm --filter yidhras-server prepare:runtime

      - name: Startup smoke test
        run: pnpm --filter yidhras-server smoke:startup

      - name: Key endpoints smoke test
        run: pnpm --filter yidhras-server smoke:endpoints

