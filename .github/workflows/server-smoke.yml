name: Server Smoke Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/server/**'
      - 'packages/contracts/**'
      - '.github/workflows/server-smoke.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Rust sidecars
        run: pnpm --filter yidhras-server build:rust

      - name: Prepare runtime prerequisites
        run: pnpm --filter yidhras-server prepare:runtime

      - name: Startup smoke test
        run: pnpm --filter yidhras-server exec vitest run --config vitest.e2e.config.ts tests/e2e/smoke-startup.spec.ts

      - name: Key endpoints smoke test
        run: pnpm --filter yidhras-server exec vitest run --config vitest.e2e.config.ts tests/e2e/smoke-endpoints.spec.ts

