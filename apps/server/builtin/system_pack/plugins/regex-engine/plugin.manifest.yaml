manifest_version: "plugin/v1"
id: "regex-engine"
name: "Regex Engine Cleaner"
version: "1.0.0"
kind: "data_cleaner"

entrypoints:
  server:
    source: "server.js"
    runtime: "node_esm"

compatibility:
  yidhras: ">=0.1.0"
  pack_id: "yidhras-system"

requested_capabilities: []

contributions:
  server:
    context_sources: []
    prompt_workflow_steps: []
    intent_grounders: []
    pack_projections: []
    api_routes: []
    step_contributors: []
    rule_contributors: []
    query_contributors: []

load:
  priority: 90

provides:
  - key: "data_cleaner.regex"
    version: "1.0.0"

metadata:
  author: "Yidhras"
  description: "提供基于正则表达式的模式匹配与替换，包含 ReDoS 防护"
