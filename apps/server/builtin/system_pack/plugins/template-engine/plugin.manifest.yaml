manifest_version: "plugin/v1"
id: "template-engine"
name: "Template Engine Cleaner"
version: "1.0.0"
kind: "tool_provider"

entrypoints:
  server:
    source: "dist/server.js"
    runtime: "node_esm"

compatibility:
  yidhras: ">=0.1.0"
  host_api: "2.0.0"
  pack_id: "yidhras-system"

requested_capabilities:
  - "server.data_cleaner.register"

contributions:
  server:
    context_sources: []
    prompt_workflow_steps: []
    api_routes: []
    step_contributors: []
    rule_contributors: []
    query_contributors: []
    data_cleaners:
      - name: "template"
        key: "data_cleaner.template"
        version: "1.0.0"
        trigger: "on_tick"
        priority: 80
        invoke: "data_cleaner.template.clean"
    slot_condition_evaluators: []
    slot_content_transformers: []
    perception_resolvers: []

load:
  priority: 80

provides:
  - key: "data_cleaner.template"
    version: "1.0.0"

metadata:
  author: "Yidhras"
  description: "提供可配置的模板字符串渲染：变量插值、修饰符链、条件块、迭代块"
