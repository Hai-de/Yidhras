      label: "琉克"
      kind: "actor"
      tags: ["observer", "shinigami"]
      state:
        alive: true
        death_cause: null
        amused: true
        suspicion_level: 0
        observed_case_pressure: 0
        cover_story_stability: 1
        evidence_chain_strength: 0
        case_theory_strength: 0
        investigation_focus: null
        roles: ["observer", "shinigami"]
  artifacts:
    - id: "artifact-death-note"
      label: "死亡笔记"
      kind: "artifact"
      entity_type: "death_note"
      tags: ["supernatural", "vessel", "lethal"]
      state:
        holder_agent_id: null
        location: "school_ground"
        visibility_level: "hidden"
  mediators:
    - id: "mediator-death-note"
      entity_ref: "artifact-death-note"
      mediator_kind: "artifact_vessel"
      grants:
        - capability_key: "invoke.claim_death_note"
        - capability_key: "invoke.learn_notebook_rules"
        - capability_key: "invoke.form_murderous_intent"
        - capability_key: "invoke.collect_target_intel"
        - capability_key: "invoke.select_judgement_target"
        - capability_key: "invoke.execute_death_note"
        - capability_key: "invoke.raise_false_suspicion"
      requires:
        - relation: "holder"
      execution_effects:
        - effect_key: "objective_enforcement"
      override_rules: []
      revocation_rules: []
      binding_rules: []
      perception_effects: []
  domains:
    - id: "domain-investigation"
      label: "调查域"
      kind: "domain"
      tags: ["institutional", "evidence"]
      state:
        visibility: "restricted"
        pressure_bias: 0.7
    - id: "domain-public-opinion"
      label: "舆论域"
      kind: "domain"
      tags: ["media", "pressure"]
      state:
        visibility: "public"
        amplification_bias: 0.8
    - id: "domain-private-planning"
      label: "私密筹划域"
      kind: "domain"
      tags: ["reflection", "planning"]
