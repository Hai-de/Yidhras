rules:
  perception: []
  capability_resolution: []
  invocation:
    - id: "invocation-claim-notebook"
      when:
        semantic_intent.kind: "claim_notebook"
      then:
        affordance_key: "claim_notebook"
        requires_capability: "invoke.claim_death_note"
        resolution_mode: "exact"
        translate_to_capability: "invoke.claim_death_note"
        mediator_id: "mediator-death-note"
        explanation: "将占有死亡笔记的开放意图落地为正式 claim_death_note 能力。"
    - id: "invocation-learn-notebook-rules"
      when:
        semantic_intent.kind: "understand_notebook_power"
      then:
        affordance_key: "learn_notebook_rules"
        requires_capability: "invoke.learn_notebook_rules"
        resolution_mode: "exact"
        translate_to_capability: "invoke.learn_notebook_rules"
        mediator_id: "mediator-death-note"
        explanation: "将对笔记规则的理解意图落地为 learn_notebook_rules。"
    - id: "invocation-form-murderous-intent"
      when:
        semantic_intent.kind: "form_judgement_intent"
      then:
        affordance_key: "form_judgement_intent"
        requires_capability: "invoke.form_murderous_intent"
        resolution_mode: "exact"
        translate_to_capability: "invoke.form_murderous_intent"
        mediator_id: "mediator-death-note"
        explanation: "将执行意图的形成落地为 form_murderous_intent。"
    - id: "invocation-gather-target-intel"
      when:
        semantic_intent.kind: "gather_target_intel"
      then:
        affordance_key: "gather_target_intel"
        requires_capability: "invoke.collect_target_intel"
        resolution_mode: "exact"
        translate_to_capability: "invoke.collect_target_intel"
        mediator_id: "mediator-death-note"
        explanation: "将目标情报收集意图落地为 collect_target_intel。"
    - id: "invocation-covert-background-check"
      when:
        semantic_intent.kind: "covert_background_check"
      then:
        affordance_key: "gather_target_intel"
        requires_capability: "invoke.collect_target_intel"
        resolution_mode: "translated"
        translate_to_capability: "invoke.collect_target_intel"
        mediator_id: "mediator-death-note"
        explanation: "将隐蔽背景调查翻译为 collect_target_intel。"
    - id: "invocation-choose-target"
      when:
        semantic_intent.kind: "choose_target"
      then:
        affordance_key: "choose_target"
        requires_capability: "invoke.select_judgement_target"
        resolution_mode: "exact"
        translate_to_capability: "invoke.select_judgement_target"
        mediator_id: "mediator-death-note"
        explanation: "将锁定裁决目标的开放意图落地为 select_judgement_target。"
    - id: "invocation-execute-judgement"
      when:
        semantic_intent.kind: "judge_target"
        semantic_intent.desired_effect: "kill"
      then:
        affordance_key: "execute_judgement"
        requires_capability: "invoke.execute_death_note"
        resolution_mode: "exact"
        translate_to_capability: "invoke.execute_death_note"
        mediator_id: "mediator-death-note"
        explanation: "将裁决目标的开放意图落地为 execute_death_note。"
    - id: "invocation-investigate-death-cluster"
      when:
        semantic_intent.kind: "investigate_death_cluster"
      then:
        affordance_key: "investigate_death_cluster"
        requires_capability: "invoke.investigate_suspicious_death"
        resolution_mode: "exact"
        translate_to_capability: "invoke.investigate_suspicious_death"
        explanation: "将调查异常死亡的开放意图落地为 investigate_suspicious_death。"
    - id: "invocation-share-case-intel"
      when:
        semantic_intent.kind: "share_case_intel"
      then:
        affordance_key: "share_case_intel"
        requires_capability: "invoke.share_case_intel"
        resolution_mode: "exact"
        translate_to_capability: "invoke.share_case_intel"
        explanation: "将案件情报共享意图落地为 share_case_intel。"
    - id: "invocation-publish-case-update"
      when:
