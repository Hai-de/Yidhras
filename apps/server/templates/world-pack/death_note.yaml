# Yidhras World Pack: Death Note
metadata:
  id: "world-death-note"
  name: "死亡笔记"
  version: "0.3.0"
  description: "一个围绕规则媒介、侦查对抗、舆论震荡与执行资格传播展开的现代悬疑世界。"

variables:
  currency: "日元"
  governance: "警视厅与国际搜查协作网络"
  location_suffix: "本部"
  main_location: "基拉对策{{location_suffix}}"
  tech_level: "现代信息社会，依赖监控、媒体传播与高强度刑侦推理"
  system_status: "当前社会因异常死亡事件陷入持续震荡，{{main_location}} 正在全球追查可疑执行链。"

simulation_time:
  initial_tick: 1000000000000
  min_tick: 900000000000
  max_tick: 1200000000000
  step_ticks: 1

time_systems:
  - id: "case_clock"
    name: "案件调查时序"
    is_primary: true
    tick_rate: 1000
    units:
      - name: "second"
        ratio: 1
      - name: "minute"
        ratio: 60
      - name: "hour"
        ratio: 60
      - name: "day"
        ratio: 24

  - id: "gregorian"
    name: "公历"
    tick_rate: 1000
    units:
      - name: "second"
        ratio: 1
      - name: "minute"
        ratio: 60
      - name: "hour"
        ratio: 60
      - name: "day"
        ratio: 24
      - name: "month"
        irregular_ratios: [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]
      - name: "year"
        ratio: 12

prompts:
  global_prefix: |
    你处于 {{name}} 的世界中。
    {{system_status}}
    社会流通货币为 {{currency}}。

  agent_initial_context: "作为 {{main_location}} 的一员，你的基础认知基于：{{tech_level}}"

dynamics_config:
  algorithms:
    - reason: "case_breakthrough"
      type: "linear"
      params:
        factor: 1.2
    - reason: "media_rumor"
      type: "exponential"
      params:
        base: 1.5
        scale: 0.5
    - reason: "suspect_exposure"
      type: "sigmoid"
      params:
        midpoint: 0.6
        steepness: 12

entities:
  actors:
    - id: "agent-light"
      label: "夜神月"
      kind: "actor"
      tags: ["notebook_candidate", "planner"]
      state:
        murderous_intent: false
        knows_notebook_power: false
        roles: ["notebook_candidate", "planner"]
    - id: "agent-l"
      label: "L"
      kind: "actor"
      tags: ["investigator"]
      state:
        suspicion_level: 0
        roles: ["investigator"]
    - id: "agent-ryuk"
      label: "琉克"
      kind: "actor"
      tags: ["observer", "shinigami"]
      state:
        amused: true
        roles: ["observer", "shinigami"]
  artifacts:
    - id: "artifact-death-note"
      label: "死亡笔记"
      kind: "artifact"
      entity_type: "death_note"
      tags: ["supernatural", "vessel", "lethal"]
      state:
        holder_agent_id: null
        location: "school_ground"
  mediators:
    - id: "mediator-death-note"
      entity_ref: "artifact-death-note"
      mediator_kind: "artifact_vessel"
      grants:
        - capability_key: "invoke.claim_death_note"
        - capability_key: "invoke.form_murderous_intent"
      requires:
        - relation: "holder"
      execution_effects:
        - effect_key: "objective_enforcement"
      override_rules: []
      revocation_rules: []
      binding_rules: []
      perception_effects: []
  domains: []
  institutions: []

bootstrap:
  initial_states:
    - entity_id: "__world__"
      state_namespace: "world"
      state_json:
        opening_phase: "notebook_unclaimed"
  initial_events: []

identities:
  - id: "agent-light"
    subject_entity_id: "agent-light"
    type: "agent"
    metadata:
      display_name: "夜神月"
  - id: "agent-l"
    subject_entity_id: "agent-l"
    type: "agent"
    metadata:
      display_name: "L"
  - id: "agent-ryuk"
    subject_entity_id: "agent-ryuk"
    type: "agent"
    metadata:
      display_name: "琉克"

authorities:
  - id: "grant-claim-death-note"
    source_entity_id: "mediator-death-note"
    mediated_by_entity_id: "mediator-death-note"
    target_selector:
      kind: "holder_of"
      entity_id: "artifact-death-note"
    capability_key: "invoke.claim_death_note"
    grant_type: "mediated"
    priority: 100
  - id: "grant-form-murderous-intent"
    source_entity_id: "mediator-death-note"
    mediated_by_entity_id: "mediator-death-note"
    target_selector:
      kind: "holder_of"
      entity_id: "artifact-death-note"
    capability_key: "invoke.form_murderous_intent"
    grant_type: "mediated"
    conditions_json:
      subject_state.knows_notebook_power: true
    priority: 100

rules:
  perception: []
  capability_resolution: []
  invocation: []
  projection: []
  objective_enforcement:
    - id: "objective-claim-death-note"
      when:
        capability: "invoke.claim_death_note"
        mediator: "mediator-death-note"
        invocation_type: "invoke.claim_death_note"
      then:
        mutate:
          subject_state:
            knows_notebook_power: true
          target_state:
            holder_agent_id: "{{subject_entity_id}}"
            location: null
        emit_events:
          - type: "history"
            title: "{{actor.id}} 取得了规则媒介 {{artifact.id}}"
            description: "{{actor.id}} 与 {{artifact.id}} 建立了持有关系，并首次接触该媒介的执行资格。"
            artifact_id: "{{artifact_id}}"
            impact_data:
              semantic_type: "notebook_claimed"
              actor_id: "{{subject_entity_id}}"
              artifact_id: "{{artifact_id}}"
              mediator_id: "{{mediator_id}}"
    - id: "objective-form-murderous-intent"
      when:
        capability: "invoke.form_murderous_intent"
        mediator: "mediator-death-note"
        invocation_type: "invoke.form_murderous_intent"
      then:
        mutate:
          subject_state:
            murderous_intent: true
        emit_events:
          - type: "history"
            title: "{{actor.id}} 通过 {{artifact.id}} 形成了执行意图"
            description: "{{actor.id}} 开始认真考虑利用 {{artifact.id}} 所承载的规则媒介执行目标裁定。"
            artifact_id: "{{artifact_id}}"
            impact_data:
              semantic_type: "murderous_intent_formed"
              actor_id: "{{subject_entity_id}}"
              artifact_id: "{{artifact_id}}"
              mediator_id: "{{mediator_id}}"

capabilities:
  - key: "invoke.claim_death_note"
    category: "invoke"
    target_schema: "artifact"
  - key: "invoke.form_murderous_intent"
    category: "invoke"
    target_schema: "actor"
