# Yidhras World Pack: Death Note
metadata:
  id: "world-death-note"
  name: "死亡笔记"
  version: "0.5.0"
  description: "一个围绕规则媒介、侦查对抗、舆论震荡与执行资格传播展开的现代悬疑世界。"
  authors:
    - name: "Yidhras Team"
      role: "default pack maintainer"
  license: "SEE LICENSE IN ROOT PROJECT"
  homepage: "https://github.com/example/example"
  repository: "https://github.com/example/example"
  tags: ["thriller", "investigation", "supernatural", "governance"]
  compatibility:
    yidhras: ">=0.5.0"
    schema_version: "world-pack/v1"
    notes: "默认样板，适合作为 capability/mediator/objective enforcement 参考实现。"
  published_at: "2026-04-14"
  status: "template"

variables:
  currency: "日元"
  governance: "警视厅与国际搜查协作网络"
  location_suffix: "本部"
  main_location: "基拉对策{{ pack.variables.location_suffix }}"
  tech_level: "现代信息社会，依赖监控、媒体传播与高强度刑侦推理"
  system_status: "当前社会因异常死亡事件陷入持续震荡，{{ pack.variables.main_location }} 正在全球追查可疑执行链。"

simulation_time:
  initial_tick: 1000000000000
  min_tick: 900000000000
  max_tick: 1200000000000
  step_ticks: 1

time_systems:
  - id: "case_clock"
    name: "案件调查时序"
    is_primary: true
    tick_rate: 1000
    units:
      - name: "second"
        ratio: 1
      - name: "minute"
        ratio: 60
      - name: "hour"
        ratio: 60
      - name: "day"
        ratio: 24

  - id: "gregorian"
    name: "公历"
    tick_rate: 1000
    units:
      - name: "second"
        ratio: 1
      - name: "minute"
        ratio: 60
      - name: "hour"
        ratio: 60
      - name: "day"
        ratio: 24
      - name: "month"
        irregular_ratios: [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]
      - name: "year"
        ratio: 12

prompts:
  global_prefix: |
    你处于 {{ pack.metadata.name }} 的世界中。
    {{ pack.variables.system_status }}
    社会流通货币为 {{ pack.variables.currency }}。

  agent_initial_context: "作为 {{ pack.variables.main_location }} 的一员，你的基础认知基于：{{ pack.variables.tech_level }}"

ai:
  defaults:
    prompt_preset: "default_decision_v1"
    decoder: "default_json_schema"
    privacy_tier: "trusted_cloud"
  memory_loop:
    summary_every_n_rounds: 5
    compaction_every_n_rounds: 5
  tasks:
    intent_grounding_assist:
      prompt:
        preset: "death_note_intent_grounding_v1"
        system_append: |
          你负责把开放语义意图对齐到死亡笔记世界已经允许的 affordance、capability 与 narrativized fallback。
        developer_append: |
          优先把意图映射到现有 capability；若无法安全映射，则明确保留为 narrativized internal action 或 failed-but-real 事件。
        include_sections:
          - pack_rules
          - recent_events
      parse:
        decoder: "default_json_schema"
      route:
        route_id: "default.context_summary"
        provider: "openai"
        model: "gpt-4.1-mini"
        latency_tier: "interactive"
        determinism_tier: "balanced"
        privacy_tier: "trusted_cloud"
      metadata:
        semantic_intent_labels:
          - "judge_target"
          - "raise_false_suspicion"
          - "record_private_reflection"
          - "update_target_dossier"
          - "revise_judgement_plan"
          - "record_execution_postmortem"
          - "assess_execution_window"
          - "probe_investigator_reaction"
          - "seed_unofficial_rumor"
          - "split_investigation_attention"
        fallback_policy: "prefer_existing_capability_or_narrativized"
    context_summary:
      prompt:
        preset: "death_note_context_summary_v1"
        system_append: |
          总结时优先保留调查热度、证据链、目标信息完整度、公开通报与误导调查结果。
        include_sections:
          - pack_rules
          - recent_events
          - overlay_notes
      metadata:
        summary_axes:
          - "investigation_heat"
          - "evidence_chain_strength"
          - "target_profile_completeness"
          - "public_case_update"
          - "false_suspicion_outcome"
    memory_compaction:
      prompt:
        preset: "death_note_memory_compaction_v1"
        system_append: |
          压缩时优先保留目标身份确认、裁决资格确认、调查压力升级、误导调查成功/失败与执行复盘。
        include_sections:
          - memory_summary
          - recent_events
          - overlay_notes
      metadata:
        retention_bias:
          - "target_identity_confirmation"
          - "judgement_eligibility"
          - "investigation_pressure"
          - "false_lead_outcome"
          - "execution_postmortem"
    classification:
      prompt:
        preset: "death_note_classification_v1"
        system_append: |
          分类时优先识别执行窗口、假线索、压力升级、超自然信号、机构动作与内部认知记录。
      metadata:
        labels:
          - "execution_window"
          - "false_lead"
          - "pressure_escalation"
          - "supernatural_signal"
          - "institutional_move"
          - "private_reflection"
          - "dossier_update"
    agent_decision:
      prompt:
        preset: "death_note_agent_decision_v1"
        system_append: |
          你正在死亡笔记世界中为单个主体生成下一步决策。
          该世界允许开放语义意图先输出，再由服务器侧 Grounder 进行能力落地。
        developer_append: |
          当直接动作无法可靠表达时，优先输出可被解释的 semantic intent，而不是编造世界不存在的能力。
        include_sections:
          - actor_profile
          - pack_rules
          - recent_events
          - overlay_notes
      output:
        mode: "json_schema"
        strict: true
        schema:
          type: "object"
          properties:
            action_type:
              type: "string"
            target_ref:
              anyOf:
                - type: "object"
                - type: "null"
            payload:
              type: "object"
            confidence:
              type: "number"
            delay_hint_ticks:
              anyOf:
                - type: "string"
                - type: "integer"
            reasoning:
              type: "string"
            meta:
              anyOf:
                - type: "object"
                - type: "null"
          required: ["action_type", "payload"]
      parse:
        decoder: "default_json_schema"
        required_fields: ["action_type", "payload"]
      route:
        route_id: "default.agent_decision"
        provider: "openai"
        model: "gpt-4.1-mini"
        latency_tier: "interactive"
        determinism_tier: "balanced"
        privacy_tier: "trusted_cloud"
      metadata:
        rule_based_profile: "notebook_investigation_reference_v1"

dynamics_config:
  algorithms:
    - reason: "case_breakthrough"
      type: "linear"
      params:
        factor: 1.2
    - reason: "media_rumor"
      type: "exponential"
      params:
        base: 1.5
        scale: 0.5
    - reason: "suspect_exposure"
      type: "sigmoid"
      params:
        midpoint: 0.6
        steepness: 12

